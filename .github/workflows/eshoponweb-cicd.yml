name: eShopOnWeb Docker Integration and CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  docker-ci:
    # Usamos un agente Linux (Ubuntu) tal como pide el laboratorio de Azure DevOps
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore src/Web/Web.csproj

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Tarea clave: Valida que el Dockerfile del laboratorio compile correctamente
    # Construye la imagen localmente sin subirla a un registro pago (ACR)
    - name: Build Custom Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/Web/Dockerfile
        push: false
        tags: eshoponweb/web:latest

    - name: Integration Test Simulation
      run: |
        echo "Contenedor Docker creado exitosamente en el agente Linux."
        echo "Simulación de empuje a Azure Container Registry (ACR) completada con éxito."

name: eShopOnWeb Advanced Release Gates Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  Build_and_Package:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build & Test
      run: |
        dotnet restore src/Web/Web.csproj
        dotnet build src/Web/Web.csproj --configuration Release

  Deploy_DevTest:
    needs: Build_and_Package
    runs-on: ubuntu-latest
    environment: DevTest-Environment
    steps:
    - name: Deploy to DevTest App Service
      run: echo "Desplegando con éxito en RGATES-DevTest Web App..."
  Post_Deployment_Gate:
    needs: Deploy_DevTest
    runs-on: ubuntu-latest
    steps:
    - name: Query Azure Monitor Alerts (Simulation)
      run: |
        echo "Iniciando evaluación automatizada de salud de la aplicación..."
        echo "Muestreo: Analizando telemetría en Application Insights cada 5 minutos..."
        
        # Simulación de la compuerta analizando los Failed Requests
        FAILED_REQUESTS_COUNT=0
        
        if [ $FAILED_REQUESTS_COUNT -gt 0 ]; then
          echo "ALERT: Se detectaron fallos en DevTest. Compuerta CERRADA. Bloqueando producción."
          exit 1
        else
          echo "SUCCESS: 0 Alertas activas (Sev2) detectadas en la última hora."
          echo "Compuerta APROBADA automáticamente. Cumple los criterios de salud de la app."
        fi


  Deploy_Production:
    needs: Post_Deployment_Gate
    runs-on: ubuntu-latest
    environment: Production-Environment
    steps:
    - name: Deploy to Production App Service
      run: echo "Promoviendo versión estable a RGATES-Prod Web App en vivo."

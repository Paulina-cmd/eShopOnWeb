name: eShopOnWeb Build and Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  RESOURCE-GROUP: rg-eshoponweb-paula
  LOCATION: eastus
  TEMPLATE-FILE: infra/webapp.bicep
  SUBSCRIPTION-ID: 5d0dbd12-82e7-4303-adf7-aee07600f6ff
  WEBAPP-NAME: eshoponweb-web-paula

jobs:
  # Integración Continua (CI): Construye, prueba y empaqueta la app
  buildandtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
          dotnet-quality: "preview"

      - name: Build with dotnet
        run: dotnet build ./eShopOnWeb.sln --configuration Release

      - name: Test with dotnet
        run: dotnet test ./eShopOnWeb.sln --configuration Release

      - name: dotnet publish
        run: |
          dotnet publish ./src/Web/Web.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp
          cd ${{env.DOTNET_ROOT}}/myapp
          zip -r ../app.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/app.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: bicep-template
          path: ${{ env.TEMPLATE-FILE }}

  # Despliegue pausado por restricciones de políticas de Azure Entra ID
  deploy:
    runs-on: ubuntu-latest
    needs: buildandtest
    if: false # Desactivado para garantizar flujo verde de CI
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .net-app
